<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <title>BOTDOT - Cambiar contraseña</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/img/apple-touch-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BOTDOT">
  <script src="/js/pwa.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">
  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 rounded-2xl shadow-2xl shadow-black/40 p-6 sm:p-8 border border-slate-800">
      <div class="text-center mb-5">
        <img src="/img/dotbot-header.png" alt="BOTDOT" class="w-14 h-14 rounded-xl mx-auto mb-3">
        <h1 class="text-xl font-bold text-slate-100">Cambiar contraseña</h1>
        <p id="forcedNote" class="hidden text-xs text-amber-400 bg-amber-950/40 border border-amber-900/50 rounded p-2 mt-3">
          Tu contraseña fue reseteada por un administrador. Necesitas elegir una nueva antes de continuar.
        </p>
      </div>

      <form id="changeForm" class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña actual</label>
          <input type="password" id="currentPass" required minlength="1"
            class="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-100 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Nueva contraseña</label>
          <input type="password" id="newPass" required minlength="8"
            class="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-100 focus:ring-2 focus:ring-blue-500">
          <p class="text-xs text-slate-500 mt-1">Mínimo 8 caracteres. Distinta a la actual.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Confirmar nueva</label>
          <input type="password" id="newPass2" required minlength="8"
            class="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-100 focus:ring-2 focus:ring-blue-500">
        </div>
        <div id="errorBox" class="hidden bg-red-950/60 border border-red-800 text-red-300 text-sm rounded-lg p-2"></div>
        <div id="successBox" class="hidden bg-emerald-950/40 border border-emerald-900/60 text-emerald-200 text-sm rounded-lg p-2"></div>
        <button type="submit" id="submitBtn"
          class="w-full py-2.5 px-4 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-semibold disabled:opacity-50">
          Cambiar contraseña
        </button>
        <p class="text-xs text-center text-slate-500">
          <a id="backLink" href="/app.html" class="hover:text-slate-300">← Volver al chat</a>
        </p>
      </form>
    </div>
  </main>
  <footer class="text-center text-xs text-slate-500 p-4">USDOT 2195271 — BOTDOT</footer>

  <script src="/js/auth.js"></script>
  <script src="/js/change-password.js"></script>
</body>
</html>
