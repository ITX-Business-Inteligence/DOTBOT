<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="theme-color" content="#1e3a8a">
  <title>BOTDOT - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">
  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 sm:p-8 border border-slate-200">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-900 text-white text-2xl font-black mb-3">B</div>
        <h1 class="text-2xl font-bold text-slate-900">BOTDOT</h1>
        <p class="text-sm text-slate-500 mt-1">Asistente de Compliance DOT/FMCSA</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input
            type="email" id="email" name="email" required
            autocomplete="email"
            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"
            placeholder="tu@intelogix.mx">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
          <input
            type="password" id="password" name="password" required
            autocomplete="current-password"
            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base">
        </div>
        <div id="errorBox" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3"></div>
        <button
          type="submit" id="submitBtn"
          class="w-full py-3 px-4 rounded-lg bg-blue-900 hover:bg-blue-800 active:bg-blue-950 text-white font-semibold transition disabled:opacity-50">
          Entrar
        </button>
      </form>

      <p class="text-xs text-slate-400 text-center mt-6">
        Acceso restringido al personal autorizado de Intelogix.<br>
        USDOT 2195271 - v0.1.0
      </p>
    </div>
  </main>
  <footer class="text-center text-xs text-slate-400 p-4">
    Esta herramienta no constituye asesoría legal.
  </footer>

  <script src="/js/auth.js"></script>
  <script>
    (async () => {
      // Si ya hay sesion, redirigir a app
      try {
        const r = await fetch('/api/auth/me');
        if (r.ok) location.href = '/app.html';
      } catch (e) {}
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorBox');
      err.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'Validando...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error de autenticacion');
        location.href = '/app.html';
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
