<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <title>BOTDOT - Alertas</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/img/apple-touch-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BOTDOT">
  <script src="/js/pwa.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col">

  <header class="bg-slate-900 text-slate-100 shadow-lg shadow-black/40 border-b border-slate-800 flex-shrink-0 sticky top-0 z-30">
    <div class="flex items-center justify-between px-4 py-3 sm:px-6">
      <div class="flex items-center gap-3">
        <a href="/app.html" class="text-slate-400 hover:text-slate-100 text-sm">← Volver al chat</a>
        <h1 class="text-lg font-bold">Alertas de expiraciones</h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="runJobBtn" class="hidden text-sm bg-amber-700 hover:bg-amber-600 px-3 py-1.5 rounded-lg" title="Solo admin: forzar un re-scan">
          ↻ Forzar scan
        </button>
        <button id="logoutBtn" class="text-sm bg-slate-800 hover:bg-slate-700 border border-slate-700 px-3 py-1.5 rounded-lg">Salir</button>
      </div>
    </div>
  </header>

  <main class="flex-1 p-4 sm:p-6 max-w-7xl mx-auto w-full space-y-4">

    <div class="flex flex-wrap gap-2 items-center">
      <span class="text-sm text-slate-400">Estado:</span>
      <button class="status-filter active" data-status="active">Activas</button>
      <button class="status-filter" data-status="dismissed">Atendidas</button>
      <button class="status-filter" data-status="">Todas</button>

      <span class="text-sm text-slate-400 ml-3">Tipo:</span>
      <button class="kind-filter active" data-kind="">Todos</button>
      <button class="kind-filter" data-kind="cdl_expired">CDL vencidos</button>
      <button class="kind-filter" data-kind="medical_expired">Medical vencidos</button>
      <button class="kind-filter" data-kind="cdl_expiring">CDL por vencer</button>
      <button class="kind-filter" data-kind="medical_expiring">Medical por vencer</button>
    </div>

    <div class="card overflow-x-auto">
      <table class="audit-table">
        <thead>
          <tr>
            <th>Urgencia</th>
            <th>Driver</th>
            <th>Tipo</th>
            <th>Fecha exp</th>
            <th>Threshold</th>
            <th>Email</th>
            <th>Detectada</th>
            <th class="text-right">Accion</th>
          </tr>
        </thead>
        <tbody id="notifTableBody">
          <tr><td colspan="8" class="text-center text-slate-500 py-6">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
    <p id="notifCount" class="text-xs text-slate-500"></p>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/notifications.js"></script>
</body>
</html>
